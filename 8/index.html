<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS BOX MODEL</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            background-color: aqua;
        }
        .box1{
            color: yellow;
            padding: 10px;
            margin: 25px;
            border: 2px solid black;
            height: 100px;            ;
        }
        .box2{
            color: red;
            padding: 10px;
            margin: 25px;
            border: 3px solid yellow;
            height: 100px;          
        }
    </style>
</head>
<body>
    <div class="box box1">
        this is a div
    </div>
     <div class="box box2">
        this is a div
    </div>
</body>
</html>
