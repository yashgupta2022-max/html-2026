<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS SELECTORS</title>
    <style>
        .red {
            color: red; /*class selector */
        }
        .blue {
            color: blue;
        }
        #green{
            color: green;    /*id selector */
        }
    </style>
</head>
<body>
    <div class="red">
        This is a div
    </div>
    <div class="blue">
        This is a another div
    </div>
    <div id="green"">
        This is a another div
    </div>
</body>
</html>
